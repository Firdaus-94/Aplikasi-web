<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00ffcc">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asep Developer</title>

<style>
.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px;
}
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}
canvas {
  opacity: 0.6;
}
/* DEFAULT = DARK */
:root {
  --bg: #000;
  --text: #fff;
  --card: #111;
  --primary: #00ffcc;
}

/* LIGHT MODE */
body.light {
  --bg: #f5f5f5;
  --text: #111;
  --card: #ffffff;
  --primary: #00c3a0;
}

/* APPLY KE SEMUA */
body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* CARD / BOX */
.song,
.project-card,
.music-player,
.navbar {
  background: var(--card);
  color: var(--text);
}

/* BUTTON */
button {
  background: var(--primary);
  color: #000;
}

/* TOGGLE BUTTON */
.theme-toggle {
  cursor: pointer;
  font-size: 20px;
  padding: 8px 12px;
  border-radius: 50%;
  background: var(--card);
  box-shadow: 0 0 10px var(--primary);
  transition: 0.3s;
}

.theme-toggle:hover {
  transform: rotate(180deg);
}

/* ===== BACKGROUND PARTICLES ===== */
#particles{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ===== NAVBAR GLASS ===== */
#navbar{
  position:fixed;
  top:0;
  width:100%;
  z-index:999;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.navbar.scrolled {
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
}

.nav-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#00ffc3;
  text-shadow:0 0 10px #00ffc3;
}

.nav-menu{
  display:flex;
  gap:20px;
  list-style:none;
}

.nav-menu a{
  color:white;
  text-decoration:none;
  position:relative;
}

.nav-menu a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  background:#00ffc3;
  left:0;
  bottom:-5px;
  transition:0.3s;
}

.nav-menu a:hover::after{
  width:100%;
}
nav {
    padding: 15px 60px;
  }

  nav h1 {
    font-size: 22px;
  }

/* ===== MOBILE ===== */
.menu-toggle{
  display:none;
  font-size:22px;
  cursor:pointer;
}

@media(max-width:768px){
  .nav-menu{
    position:absolute;
    top:60px;
    right:-100%;
    flex-direction:column;
    background:#111;
    width:200px;
    padding:20px;
    transition:0.3s;
  }

  .nav-menu.active{
    right:0;
  }

  .menu-toggle{
    display:block;
  }
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  margin-top: 100px;
  gap:15px;
  position: relative;
  z-index: 5;
}
.hero button {
  margin-top: 20px;
  padding: 12px 30px;
  border-radius: 30px;
  background: #00ffcc;
  box-shadow: 0 0 20px #00ffcc;
  position: relative;
  z-index: 10;
}
.hero h1 {
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 0 10px #00ffcc;
}

.typing {
  font-size: 18px;
  color: #00ffcc;
  text-shadow: 0 0 8px #00ffcc;
  color:#00ffc3;
}
.hero::after {
  content: "";
  width: 100px;
  height: 3px;
  background: #00ffcc;
  display: block;
  margin: 15px auto;
  box-shadow: 0 0 10px #00ffcc;
}

.profile{
  width:140px;
  height:140px;
  border-radius:50%;
  border:3px solid #00ffc3;
  box-shadow:0 0 30px #00ffc3;
  object-fit:cover;
}
.profile-img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #00ffcc;
  box-shadow: 0 0 30px #00ffcc;
  margin-bottom: 15px;
}
.profile-img {
  animation: float 3s ease-in-out infinite, glow 2s infinite alternate;
}
@media(max-width:768px){
  .profile-img {
    width: 120px;
    height: 120px;
  }

  .hero h1 {
    font-size: 24px;
  }
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

@keyframes glow {
  from { box-shadow: 0 0 15px #00ffcc; }
  to { box-shadow: 0 0 45px #00ffcc; }
}

/* ===== BUTTON NEON ===== */
button {
  padding: 12px 30px;
  border-radius: 30px;
  border: none;
  font-weight: bold;
  background: linear-gradient(45deg, #00ffcc, #00ffaa);
  box-shadow: 0 0 20px #00ffcc;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px #00ffcc, 0 0 80px #00ffcc;
}

/* ===== SECTION GLASS ===== */
section{
  padding:80px 20px;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 20px rgba(0,255,200,0.2);
}

/* ===== SOCIAL ICON ===== */
/* ===== FLOAT BUTTON ===== */
/* FLOAT SOSIAL */
.float-social{
  position: fixed;   /* 🔥 WAJIB */
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;     /* biar gak ketutup */
}

.float-social a{
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: white;
  text-decoration: none;
}

/* WA */
.float-social .wa{
  background: #25D366;
  box-shadow: 0 0 15px #25D366;
}

/* IG */
.float-social .ig{
  background: linear-gradient(45deg, #ff0080, #ff8c00);
  box-shadow: 0 0 15px #ff0080;
}

/* HOVER */
.float-social a:hover{
  transform: scale(1.15);
}

/* ===== REVEAL ===== */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

.reveal.show{
  opacity:1;
  transform:translateY(0);
}
.skill-box {
  max-width: 400px;
  margin: auto;
}

.bar {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}

.bar span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, #00ffcc, #00ffaa);
  box-shadow: 0 0 10px #00ffcc;
  width: 0;
  transition: 2s;
}
.skill-bar span {
  display: block;
  height: 6px;
  background: #00ffcc;
  animation: load 2s ease;
}

@keyframes load {
  from { width: 0; }
}
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 20px;
}
.project-card {
  transition: 0.3s;
}

.project-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 25px #00ffcc;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,255,200,0.2);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ffcc;
}
}

.card img {
  width: 100%;
  border-radius: 10px;
}
form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 300px;
  margin: auto;
}

input, textarea {
  padding: 10px;
  border-radius: 10px;
  border: none;
}
.card {
  transform-style: preserve-3d;
  transition: transform 0.2s;
}
.trail {
  position: fixed;
  width: 10px;
  height: 10px;
  background: #00ffcc;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
  animation: fadeOut 0.5s linear;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(2);
  }
}
#matrix {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}
/* ===== FLOAT WRAPPER ===== */
.float-social{
  position: fixed;
  bottom: 100px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 2000;
}

/* ===== BUTTON ===== */

/* ===== 🔥 PULSE EFFECT ===== */
.float-social .wa::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  background:#25D366;
  animation:pulse 1.8s infinite;
  z-index:-1;
}

@keyframes pulse{
  0%{ transform:scale(1); opacity:0.7;}
  70%{ transform:scale(1.8); opacity:0;}
  100%{ opacity:0;}
}

/* ===== 🔥 BOUNCE ===== */
.bounce{
  animation:bounce 2s infinite;
}

@keyframes bounce{
  0%,100%{ transform:translateY(0);}
  50%{ transform:translateY(-8px);}
}

/* ===== 🔔 NOTIF ===== */
.wa-notif{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{ opacity:1;}
  50%{ opacity:0.3;}
}
/* ===== POPUP WA ===== */
.wa-popup{
  position: fixed;
  bottom: 100px;
  right: 90px;
  background: #111;
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 13px;
  box-shadow: 0 0 15px rgba(0,255,200,0.3);
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  z-index: 9999;
  pointer-events: none;
}

/* panah kecil */
.wa-popup::after{
  content:"";
  position:absolute;
  bottom:-6px;
  right:20px;
  border-width:6px;
  border-style:solid;
  border-color:#111 transparent transparent transparent;
}

/* muncul */
.wa-popup.show{
  opacity:1;
  transform: translateY(0);
}

/* =========================
   🎵 MUSIC PLAYER CONTAINER
========================= */
@media (min-width: 768px) {
.music-player{
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(0,255,200,0.2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
  z-index: 20;
}
/* kasih ruang biar konten gak ketutup */
body {
  padding-bottom: 90px;
}

/* =========================
   🎵 LEFT (COVER + TITLE)
========================= */
.music-left{
  display: flex;
  align-items: center;
  gap: 10px;
  width: 40%;
}

.music-left img{
  width: 45px;
  height: 45px;
  border-radius: 8px;
  object-fit: cover;
  box-shadow: 0 0 10px #00ffcc;
}

/* animasi saat play */
.music-left img.playing{
  animation: spin 5s linear infinite;
}

@keyframes spin{
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}

.music-info{
  font-size: 13px;
  color: #00ffcc;
}

/* =========================
   🎵 CONTROLS (TENGAH)
========================= */
.controls{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

/* tombol umum */
.controls button{
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(45deg,#00ffcc,#00ffaa);
  color: black;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 10px #00ffcc;
  transition: 0.2s;
}

/* tombol play utama */
#playBtn{
  width: 50px;
  height: 50px;
  font-size: 18px;
}

/* hover */
.controls button:hover{
  transform: scale(1.1);
  box-shadow: 0 0 20px #00ffcc;
}

/* klik */
.controls button:active{
  transform: scale(0.9);
}

/* =========================
   🎵 RIGHT (PROGRESS)
========================= */
.music-right{
  width: 30%;
  display: flex;
  align-items: center;
}

/* progress bar */
#progress{
  width: 100%;
  height: 4px;
  appearance: none;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  outline: none;
}

/* progress fill */
#progress::-webkit-slider-thumb{
  appearance: none;
  width: 12px;
  height: 12px;
  background: #00ffcc;
  border-radius: 50%;
  box-shadow: 0 0 10px #00ffcc;
  cursor: pointer;
}

/* =========================
   🎵 PLAYLIST GRID
========================= */
@media (min-width: 768px) {

  .playlist {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 kolom */
    gap: 25px;
    padding: 20px 80px;
  }

  .card {
    width: 100%;
    transition: 0.3s;
  }
  .card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 0 25px #00ffcc;
}


.song:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ffcc;
}

.song img {
  width: 100%;
  border-radius: 10px;
}

/* =========================
🎵 CARD LAGU
========================= */
.song-card {
  background: #111;
  border-radius: 12px;
  padding: 8px;
  cursor: pointer;
  transition: 0.3s;
  overflow: hidden;
}

/* hover efek */
.song-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffcc;
}
.song-card::after {
  content: "▶";
  position: absolute;
  bottom: 15px;
  right: 15px;
  background: #00ffcc;
  color: #000;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: 0.3s;
}

.song-card:hover::after {
  opacity: 1;
}

/* aktif (yang sedang diputar) */
.song-card.active {
  border: 2px solid #00ffcc;
}
/* =========================
🖼 COVER
========================= */
.song-card img {
  width: 100%;
  aspect-ratio: 1 / 1;   /* 🔥 bikin kotak (rapi banget) */
  object-fit: cover;
  border-radius: 10px;
}

/* =========================
📝 TITLE
========================= */
.song-card p {
  color: #fff;
  font-size: 13px;
  margin-top: 6px;

  /* biar tidak panjang */
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* =========================
   🎵 SEARCH BOX
========================= */
.music-search{
  display: flex;
  gap: 10px;
  padding: 10px;
}

.music-search input{
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.music-search button{
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #00ffcc;
  box-shadow: 0 0 10px #00ffcc;
}
.search-box {
  max-width: 100px;
  margin: 30px auto;
  display: flex;
  gap: 10px;
}

.search-box input {
  flex: 0.5;
}
@media (min-width: 768px) {

  .hero {
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .hero img {
    width: 150px;
    height: 150px;
  }

  .hero h1 {
    font-size: 40px;
  }

  .hero p {
    font-size: 18px;
  }

}
@media (min-width: 768px) {

  .playlist {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px 60px;
  }

  .card img {
    height: 180px;
    object-fit: cover;
  }

}

/* =========================
📱 RESPONSIVE MOBILE
========================= */
@media (min-width: 600px) {
  .playlist {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 900px) {
  .playlist {
    grid-template-columns: repeat(4, 1fr);
  }
}
.install-btn {

  border: none;
  padding: 12px 16px;
  border-radius: 20px;
  box-shadow: 0 0 10px #00ffcc;
  display: none;
  z-index: 999;
}
</style>

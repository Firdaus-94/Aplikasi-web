<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffcc">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asep Developer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.container {
  max-width: 1200px;
  margin: auto;
  padding: 0 20px;
}
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}
canvas {
  opacity: 0.6;
}
/* DEFAULT = DARK */
:root {
  --bg: #000;
  --text: #fff;
  --card: #111;
  --primary: #00ffcc;
}

/* LIGHT MODE */
body.light {
  --bg: #f5f5f5;
  --text: #111;
  --card: #ffffff;
  --primary: #00c3a0;
}

/* APPLY KE SEMUA */
body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* CARD / BOX */
.song,
.project-card,
.music-player,
.navbar {
  background: var(--card);
  color: var(--text);
}

/* BUTTON */
button {
  background: var(--primary);
  color: #000;
}

/* TOGGLE BUTTON */
.theme-toggle {
  cursor: pointer;
  font-size: 20px;
  padding: 8px 12px;
  border-radius: 50%;
  background: var(--card);
  box-shadow: 0 0 10px var(--primary);
  transition: 0.3s;
}

.theme-toggle:hover {
  transform: rotate(180deg);
}

/* ===== BACKGROUND PARTICLES ===== */
#particles{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ===== NAVBAR GLASS ===== */
#navbar{
  position:fixed;
  top:0;
  width:100%;
  z-index:999;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.navbar.scrolled {
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
}

.nav-container{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#00ffc3;
  text-shadow:0 0 10px #00ffc3;
}

.nav-menu{
  display:flex;
  gap:20px;
  list-style:none;
}

.nav-menu a{
  color:white;
  text-decoration:none;
  position:relative;
}

.nav-menu a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  background:#00ffc3;
  left:0;
  bottom:-5px;
  transition:0.3s;
}

.nav-menu a:hover::after{
  width:100%;
}
nav {
    padding: 15px 60px;
  }

  nav h1 {
    font-size: 22px;
  }

/* ===== MOBILE ===== */
.menu-toggle{
  display:none;
  font-size:22px;
  cursor:pointer;
}

@media(max-width:768px){
  .nav-menu{
    position:absolute;
    top:60px;
    right:-100%;
    flex-direction:column;
    background:#111;
    width:200px;
    padding:20px;
    transition:0.3s;
  }

  .nav-menu.active{
    right:0;
  }

  .menu-toggle{
    display:block;
  }
}

/* ===== HERO ===== */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  margin-top: 100px;
  gap:15px;
  position: relative;
  z-index: 5;
}
.hero button {
  margin-top: 20px;
  padding: 12px 30px;
  border-radius: 30px;
  background: #00ffcc;
  box-shadow: 0 0 20px #00ffcc;
  position: relative;
  z-index: 10;
}
.hero h1 {
  font-size: 32px;
  font-weight: bold;
  text-shadow: 0 0 10px #00ffcc;
}

.typing {
  font-size: 18px;
  color: #00ffcc;
  text-shadow: 0 0 8px #00ffcc;
  color:#00ffc3;
}
.hero::after {
  content: "";
  width: 100px;
  height: 3px;
  background: #00ffcc;
  display: block;
  margin: 15px auto;
  box-shadow: 0 0 10px #00ffcc;
}

.profile{
  width:140px;
  height:140px;
  border-radius:50%;
  border:3px solid #00ffc3;
  box-shadow:0 0 30px #00ffc3;
  object-fit:cover;
}
.profile-img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #00ffcc;
  box-shadow: 0 0 30px #00ffcc;
  margin-bottom: 15px;
}
.profile-img {
  animation: float 3s ease-in-out infinite, glow 2s infinite alternate;
}
@media(max-width:768px){
  .profile-img {
    width: 120px;
    height: 120px;
  }

  .hero h1 {
    font-size: 24px;
  }
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

@keyframes glow {
  from { box-shadow: 0 0 15px #00ffcc; }
  to { box-shadow: 0 0 45px #00ffcc; }
}

/* ===== BUTTON NEON ===== */
button {
  padding: 12px 30px;
  border-radius: 30px;
  border: none;
  font-weight: bold;
  background: linear-gradient(45deg, #00ffcc, #00ffaa);
  box-shadow: 0 0 20px #00ffcc;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px #00ffcc, 0 0 80px #00ffcc;
}

/* ===== SECTION GLASS ===== */
section{
  padding:80px 20px;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 20px rgba(0,255,200,0.2);
}

/* ===== SOCIAL ICON ===== */
/* ===== FLOAT BUTTON ===== */
/* FLOAT SOSIAL */
.float-social{
  position: fixed;   /* 🔥 WAJIB */
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;     /* biar gak ketutup */
}

.float-social a{
  width: 55px;
  height: 55px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: white;
  text-decoration: none;
}

/* WA */
.float-social .wa{
  background: #25D366;
  box-shadow: 0 0 15px #25D366;
}

/* IG */
.float-social .ig{
  background: linear-gradient(45deg, #ff0080, #ff8c00);
  box-shadow: 0 0 15px #ff0080;
}

/* HOVER */
.float-social a:hover{
  transform: scale(1.15);
}

/* ===== REVEAL ===== */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

.reveal.show{
  opacity:1;
  transform:translateY(0);
}
.skill-box {
  max-width: 400px;
  margin: auto;
}

.bar {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
}

.bar span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, #00ffcc, #00ffaa);
  box-shadow: 0 0 10px #00ffcc;
  width: 0;
  transition: 2s;
}
.skill-bar span {
  display: block;
  height: 6px;
  background: #00ffcc;
  animation: load 2s ease;
}

@keyframes load {
  from { width: 0; }
}
.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 20px;
}
.project-card {
  transition: 0.3s;
}

.project-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 25px #00ffcc;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  backdrop-filter: blur(10px);
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,255,200,0.2);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ffcc;
}
}

.card img {
  width: 100%;
  border-radius: 10px;
}
form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 300px;
  margin: auto;
}

input, textarea {
  padding: 10px;
  border-radius: 10px;
  border: none;
}
.card {
  transform-style: preserve-3d;
  transition: transform 0.2s;
}
.trail {
  position: fixed;
  width: 10px;
  height: 10px;
  background: #00ffcc;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
  animation: fadeOut 0.5s linear;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(2);
  }
}
#matrix {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}
/* ===== FLOAT WRAPPER ===== */
.float-social{
  position: fixed;
  bottom: 100px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 2000;
}

/* ===== BUTTON ===== */

/* ===== 🔥 PULSE EFFECT ===== */
.float-social .wa::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  background:#25D366;
  animation:pulse 1.8s infinite;
  z-index:-1;
}

@keyframes pulse{
  0%{ transform:scale(1); opacity:0.7;}
  70%{ transform:scale(1.8); opacity:0;}
  100%{ opacity:0;}
}

/* ===== 🔥 BOUNCE ===== */
.bounce{
  animation:bounce 2s infinite;
}

@keyframes bounce{
  0%,100%{ transform:translateY(0);}
  50%{ transform:translateY(-8px);}
}

/* ===== 🔔 NOTIF ===== */
.wa-notif{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{ opacity:1;}
  50%{ opacity:0.3;}
}
/* ===== POPUP WA ===== */
.wa-popup{
  position: fixed;
  bottom: 100px;
  right: 90px;
  background: #111;
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 13px;
  box-shadow: 0 0 15px rgba(0,255,200,0.3);
  opacity: 0;
  transform: translateY(20px);
  transition: 0.4s;
  z-index: 9999;
  pointer-events: none;
}

/* panah kecil */
.wa-popup::after{
  content:"";
  position:absolute;
  bottom:-6px;
  right:20px;
  border-width:6px;
  border-style:solid;
  border-color:#111 transparent transparent transparent;
}

/* muncul */
.wa-popup.show{
  opacity:1;
  transform: translateY(0);
}

/* =========================
   🎵 MUSIC PLAYER CONTAINER
========================= */
@media (min-width: 768px) {
.music-player{
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  border-top: 1px solid rgba(0,255,200,0.2);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
  z-index: 20;
}
/* kasih ruang biar konten gak ketutup */
body {
  padding-bottom: 90px;
}

/* =========================
   🎵 LEFT (COVER + TITLE)
========================= */
.music-left{
  display: flex;
  align-items: center;
  gap: 10px;
  width: 40%;
}

.music-left img{
  width: 45px;
  height: 45px;
  border-radius: 8px;
  object-fit: cover;
  box-shadow: 0 0 10px #00ffcc;
}

/* animasi saat play */
.music-left img.playing{
  animation: spin 5s linear infinite;
}

@keyframes spin{
  from{ transform: rotate(0deg); }
  to{ transform: rotate(360deg); }
}

.music-info{
  font-size: 13px;
  color: #00ffcc;
}

/* =========================
   🎵 CONTROLS (TENGAH)
========================= */
.controls{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

/* tombol umum */
.controls button{
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(45deg,#00ffcc,#00ffaa);
  color: black;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 10px #00ffcc;
  transition: 0.2s;
}

/* tombol play utama */
#playBtn{
  width: 50px;
  height: 50px;
  font-size: 18px;
}

/* hover */
.controls button:hover{
  transform: scale(1.1);
  box-shadow: 0 0 20px #00ffcc;
}

/* klik */
.controls button:active{
  transform: scale(0.9);
}

/* =========================
   🎵 RIGHT (PROGRESS)
========================= */
.music-right{
  width: 30%;
  display: flex;
  align-items: center;
}

/* progress bar */
#progress{
  width: 100%;
  height: 4px;
  appearance: none;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  outline: none;
}

/* progress fill */
#progress::-webkit-slider-thumb{
  appearance: none;
  width: 12px;
  height: 12px;
  background: #00ffcc;
  border-radius: 50%;
  box-shadow: 0 0 10px #00ffcc;
  cursor: pointer;
}

/* =========================
   🎵 PLAYLIST GRID
========================= */
@media (min-width: 768px) {

  .playlist {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 kolom */
    gap: 25px;
    padding: 20px 80px;
  }

  .card {
    width: 100%;
    transition: 0.3s;
  }
  .card:hover {
  transform: translateY(-8px) scale(1.03);
  box-shadow: 0 0 25px #00ffcc;
}


.song:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #00ffcc;
}

.song img {
  width: 100%;
  border-radius: 10px;
}

/* =========================
🎵 CARD LAGU
========================= */
.song-card {
  background: #111;
  border-radius: 12px;
  padding: 8px;
  cursor: pointer;
  transition: 0.3s;
  overflow: hidden;
}

/* hover efek */
.song-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffcc;
}
.song-card::after {
  content: "▶";
  position: absolute;
  bottom: 15px;
  right: 15px;
  background: #00ffcc;
  color: #000;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: 0.3s;
}

.song-card:hover::after {
  opacity: 1;
}

/* aktif (yang sedang diputar) */
.song-card.active {
  border: 2px solid #00ffcc;
}
/* =========================
🖼 COVER
========================= */
.song-card img {
  width: 100%;
  aspect-ratio: 1 / 1;   /* 🔥 bikin kotak (rapi banget) */
  object-fit: cover;
  border-radius: 10px;
}

/* =========================
📝 TITLE
========================= */
.song-card p {
  color: #fff;
  font-size: 13px;
  margin-top: 6px;

  /* biar tidak panjang */
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* =========================
   🎵 SEARCH BOX
========================= */
.music-search{
  display: flex;
  gap: 10px;
  padding: 10px;
}

.music-search input{
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.music-search button{
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #00ffcc;
  box-shadow: 0 0 10px #00ffcc;
}
.search-box {
  max-width: 100px;
  margin: 30px auto;
  display: flex;
  gap: 10px;
}

.search-box input {
  flex: 0.5;
}
@media (min-width: 768px) {

  .hero {
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .hero img {
    width: 150px;
    height: 150px;
  }

  .hero h1 {
    font-size: 40px;
  }

  .hero p {
    font-size: 18px;
  }

}
@media (min-width: 768px) {

  .playlist {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px 60px;
  }

  .card img {
    height: 180px;
    object-fit: cover;
  }

}

/* =========================
📱 RESPONSIVE MOBILE
========================= */
@media (min-width: 600px) {
  .playlist {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 900px) {
  .playlist {
    grid-template-columns: repeat(4, 1fr);
  }
}

</style>
</head>

</div>
<script>
// ===============================
// 🎵 ELEMENT
// ===============================
const audio = document.getElementById("bg-music");
const title = document.getElementById("music-title");
const cover = document.getElementById("music-cover");
const progress = document.getElementById("progress");
const playBtn = document.getElementById("playBtn");

// ===============================
// 🎵 PLAYLIST DEFAULT
// ===============================
let playlist = [
  {
    title: "SoundHelix 1",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    cover: "https://picsum.photos/200?1"
  },
  {
    title: "SoundHelix 2",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
    cover: "https://picsum.photos/200?2"
  }
];

let current = 0;

// ===============================
// 🎵 LOAD MUSIC
// ===============================
function loadMusic(index){
  const song = playlist[index];

  // support API + local
  const src = song.audio || song.src;
  const titleText = song.name || song.title;
  const artist = song.artist_name || "";
  const img = song.image || song.cover;

  if(!src){
    alert("Lagu tidak memiliki audio");
    return;
  }

  audio.src = src;
  title.innerText = artist ? `${titleText} - ${artist}` : titleText;
  cover.src = img;

  audio.play().catch(()=>{});

  playBtn.innerText = "⏸";

  renderPlaylist();
}

// ===============================
// ▶ PLAY / PAUSE
// ===============================
function toggleMusic(){
  if(audio.paused){
    audio.play();
    playBtn.innerText = "⏸";
  }else{
    audio.pause();
    playBtn.innerText = "▶";
  }
}

// ===============================
// ⏭ NEXT
// ===============================
function nextMusic(){
  current = (current + 1) % playlist.length;
  loadMusic(current);
}

// ===============================
// ⏮ PREV
// ===============================
function prevMusic(){
  current = (current - 1 + playlist.length) % playlist.length;
  loadMusic(current);
}

// ===============================
// 🎧 PLAY DARI PLAYLIST
// ===============================
function playFromPlaylist(index){
  current = index;
  loadMusic(current);
}

// ===============================
// 🔥 RENDER PLAYLIST UI
// ===============================
function renderPlaylist(){
  const container = document.getElementById("playlist");
  container.innerHTML = "";

  playlist.forEach((song, i) => {

    const titleText = (song.name || song.title || "Unknown")
  .substring(0, 25);
    const img = song.image || song.cover;

    container.innerHTML += `
      <div class="song-card ${i === current ? 'active' : ''}" onclick="playFromPlaylist(${i})">
        <img src="${img}">
        <p>${titleText}</p>
      </div>
    `;
  });
}

// ===============================
// 🔍 SEARCH MUSIC (API JAMENDO)
// ===============================
async function searchMusic(){
  const query = document.getElementById("searchMusic").value;

  if(!query) return alert("Masukkan nama lagu");

  const url = `https://api.jamendo.com/v3.0/tracks/?client_id=b8796d64&format=json&limit=10&search=${query}`;

  try{
    const res = await fetch(url);
    const data = await res.json();

    if(!data.results || data.results.length === 0){
      alert("Lagu tidak ditemukan");
      return;
    }

    playlist = data.results;
    current = 0;

    loadMusic(current);

  }catch(err){
    console.log(err);
    alert("Gagal ambil lagu dari API");
  }
}

// ===============================
// 🎚 PROGRESS BAR UPDATE
// ===============================
audio.addEventListener("timeupdate", () => {
  if(audio.duration){
    progress.value = (audio.currentTime / audio.duration) * 100;
  }
});

// ===============================
// 🎚 SEEK (GESER LAGU)
// ===============================
progress.addEventListener("input", () => {
  if(audio.duration){
    audio.currentTime = (progress.value / 100) * audio.duration;
  }
});

// ===============================
// 🔁 AUTO NEXT SAAT LAGU SELESAI
// ===============================
audio.addEventListener("ended", () => {
  nextMusic();
});


// ===============================
// 🚀 INIT
// ===============================
window.onload = () => {
  renderPlaylist();
  loadMusic(current);
};

/* MENU */
function toggleMenu(){
  document.querySelector(".nav-menu").classList.toggle("active");
}
window.addEventListener("scroll", () => {
  document.querySelector(".navbar")
    .classList.toggle("scrolled", window.scrollY > 50);
});
const toggle = document.getElementById("themeToggle");

// load dari localStorage
if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light");
  toggle.textContent = "☀️";
}

toggle.addEventListener("click", () => {
  document.body.classList.toggle("light");

  if (document.body.classList.contains("light")) {
    localStorage.setItem("theme", "light");
    toggle.textContent = "☀️";
  } else {
    localStorage.setItem("theme", "dark");
    toggle.textContent = "🌙";
  }
});

/* REVEAL */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".reveal").forEach(el=>{
  observer.observe(el);
});

/* TYPING */
const words = ["Web Developer 🚀","UI Designer 🎨"];
let i=0,j=0,text="",del=false;

function type(){
  const el=document.querySelector(".typing");

  if(!del){
    text=words[i].substring(0,j++);
  }else{
    text=words[i].substring(0,j--);
  }

  el.innerHTML=text;

  if(!del && j===words[i].length){
    del=true;
    setTimeout(type,1000);
    return;
  }

  if(del && j===0){
    del=false;
    i=(i+1)%words.length;
  }

  setTimeout(type,del?50:100);
}
type();

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];

for(let i=0;i<50;i++){
  p.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    d:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  p.forEach(pt=>{
    ctx.beginPath();
    ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);
    ctx.fillStyle="#00ffc3";
    ctx.fill();

    pt.y+=pt.d;
    if(pt.y>canvas.height){
      pt.y=0;
      pt.x=Math.random()*canvas.width;
    }
  });
}

setInterval(draw,30);

const skillBars = document.querySelectorAll(".bar span");

const skillObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.style.width = entry.target.getAttribute("style").replace("width:", "");
    }
  });
});
// 🔔 simulasi notif masuk
setInterval(()=>{
  const notif = document.getElementById("waNotif");

  let count = parseInt(notif.innerText);
  count++;

  notif.innerText = count;

}, 8000); // tiap 8 detik nambah

function kirimWA(){
  alert("Menghubungkan ke WhatsApp...");
  let nama = document.getElementById("nama").value || "User";
  let pesan = document.getElementById("pesan").value || "Saya tertarik dengan jasa Anda";

  let text = `Halo Asep Developer
Nama: ${nama}
Pesan: ${pesan}`;

  let url = "https://wa.me/6285770959440?text=" + encodeURIComponent(text);

  window.open(url, "_blank");
}

cards.forEach(card => {
  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = -(y / rect.height - 0.5) * 15;
    const rotateY = (x / rect.width - 0.5) * 15;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  card.addEventListener("mouseleave", () => {
    card.style.transform = "rotateX(0) rotateY(0)";
  });
});

document.addEventListener("mousemove", e => {
  const trail = document.createElement("div");
  trail.className = "trail";

  trail.style.left = e.clientX + "px";
  trail.style.top = e.clientY + "px";

  document.body.appendChild(trail);

  setTimeout(() => trail.remove(), 500);
});
const matrix = document.getElementById("matrix");
const ctx2 = matrix.getContext("2d");

matrix.width = window.innerWidth;
matrix.height = window.innerHeight;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = matrix.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
  ctx2.fillStyle = "rgba(0,0,0,0.05)";
  ctx2.fillRect(0, 0, matrix.width, matrix.height);

  ctx2.fillStyle = "#00ffcc";
  ctx2.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx2.fillText(text, i * fontSize, y * fontSize);

    if (y * fontSize > matrix.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  });
}

setInterval(drawMatrix, 35);

const clickSound = document.getElementById("clickSound");

document.addEventListener("click", () => {
  clickSound.currentTime = 0;
  clickSound.play();
});
// 🔥 popup otomatis muncul
const texts = [
  "👋 Butuh bantuan?",
  "💬 Chat kami sekarang!",
  "🔥 Ada yang bisa kami bantu?",
  "🚀 Konsultasi gratis!"
];

setInterval(()=>{
  const popup = document.getElementById("wa-popup");
  popup.innerText = texts[Math.floor(Math.random()*texts.length)];

  popup.classList.add("show");

  setTimeout(()=>{
    popup.classList.remove("show");
  }, 4000);

}, 15000);

// ==============================
// 💤 DETEKSI USER IDLE
// ==============================
let idleTime = 0;
const idleLimit = 10; // detik (ubah sesuai kebutuhan)

// reset kalau user gerak
function resetIdle(){
  idleTime = 0;
}

// event user aktif
["mousemove","keydown","scroll","click","touchstart"].forEach(evt=>{
  document.addEventListener(evt, resetIdle);
});

// hitung idle tiap detik
setInterval(()=>{
  idleTime++;

  if(idleTime === idleLimit){
    showPopupIdle();
  }

},1000);

// ==============================
// 🔥 TAMPILKAN POPUP
// ==============================
function showPopupIdle(){
  const popup = document.getElementById("wa-popup");

  if(!popup) return;

  popup.innerText = "👀 Masih di sana? Butuh bantuan?";
  popup.classList.add("show");

  setTimeout(()=>{
    popup.classList.remove("show");
  }, 5000);
}
// ⬇️ TAMBAH DI JS
window.addEventListener("scroll", ()=>{
  let scroll = window.scrollY;
  let height = document.body.scrollHeight - window.innerHeight;
  let progress = (scroll / height) * 100;

  document.getElementById("progress-bar").style.width = progress + "%";
});
// ⬇️ TAMBAH
document.querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("mousemove", e=>{
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2;
    const y = e.clientY - rect.top - rect.height/2;

    btn.style.transform = `translate(${x*0.2}px, ${y*0.2}px)`;
  });

  btn.addEventListener("mouseleave", ()=>{
    btn.style.transform = "translate(0,0)";
  });
});
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("PWA aktif"))
    .catch(err => console.log("SW gagal", err));
}
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
};
</script>
